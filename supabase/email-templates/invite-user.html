<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Invitation</title>
  </head>
  <body style="margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f8fafc;color:#0f172a;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" style="max-width:480px;background:#ffffff;border-radius:12px;padding:32px 28px;box-shadow:0 1px 3px rgba(15,23,42,0.08);">
            <tr>
              <td align="center" style="padding-bottom:20px;">
                <img src="{{ .SiteURL }}/brand/adakaro-mark.svg" alt="Adakaro" width="48" height="48" style="display:block;" />
                <p style="margin:12px 0 0;font-size:20px;font-weight:600;letter-spacing:-0.02em;">Adakaro</p>
                <p style="margin:8px 0 0;font-size:14px;color:#64748b;line-height:1.5;">You’ve been invited to join as a teacher.</p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:24px 0 8px;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#0f172a;color:#ffffff;text-decoration:none;font-size:15px;font-weight:600;padding:12px 24px;border-radius:8px;">Accept invitation</a>
              </td>
            </tr>
            <tr>
              <td style="padding-top:20px;font-size:12px;color:#94a3b8;line-height:1.5;">
                If the button doesn’t work, copy and paste this link into your browser:<br />
                <span style="word-break:break-all;color:#64748b;">{{ .ConfirmationURL }}</span>
              </td>
            </tr>
          </table>
          <p style="margin:24px 0 0;font-size:12px;color:#94a3b8;">This email was sent regarding your Adakaro account.</p>
        </td>
      </tr>
    </table>
  </body>
</html>
