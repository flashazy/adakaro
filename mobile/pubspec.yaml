name: adakaro_mobile
description: Adakaro mobile app for parents and teachers (Flutter). Uses the same Supabase project as the web app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  intl: ^0.19.0
  flutter_dotenv: ^6.0.1
  url_launcher: ^6.2.6
  file_picker: ^8.1.7
  http: ^1.2.0
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.4
  pdf: ^3.11.1
  printing: ^5.13.3
  path_provider: ^2.1.4
  share_plus: ^10.1.2
  flutter_slidable: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env.example
    - .env
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
