include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # `Color.withOpacity` deprecation churn until SDK migration is batched.
    deprecated_member_use: ignore

linter:
  rules:
    # Default `flutter analyze` treats infos as fatal; const hints are noisy for WIP UI.
    prefer_const_constructors: false
    prefer_const_literals_to_create_immutables: false
    avoid_print: true
